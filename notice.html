<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Yu Gothic UI","Meiryo",sans-serif;
}

body{
    background:#eef3f8;
}

.app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
}

.sidebar{
    background:linear-gradient(180deg,#2563eb,#1d4ed8);
    color:white;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:35px;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:10px;
}

.menu a{
    display:block;
    padding:14px 16px;
    color:white;
    text-decoration:none;
    border-radius:12px;
    transition:.2s;
}

.menu a:hover,
.menu a.active{
    background:rgba(255,255,255,.18);
}

.main{
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.page-title{
    font-size:32px;
    color:#2563eb;
}

.user{
    background:white;
    padding:12px 18px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.notice{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    border-left:6px solid #2563eb;
}

.notice h2{
    color:#2563eb;
    margin-bottom:10px;
    font-size:22px;
}

.notice-date{
    color:#777;
    margin-bottom:15px;
    font-size:14px;
}

.notice p{
    line-height:1.8;
}

.new{
    display:inline-block;
    background:#e53935;
    color:white;
    font-size:12px;
    padding:3px 8px;
    border-radius:999px;
    margin-left:8px;
}

@media(max-width:700px){

.app{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

}
</style>
</head>
