<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        お知らせ管理 | 川中島中学校 CMS

    </title>

    <link rel="stylesheet"
          href="../css/admin.css">

</head>

<body>

<div class="dashboard">

    <!-- ===== サイドバー ===== -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <div class="logo-icon">

                🏫

            </div>

            <h2>

                川中島中学校

            </h2>

            <p>

                CMS Version4

            </p>

        </div>

        <nav class="sidebar-menu">

            <a href="dashboard.html">

                <span class="menu-icon">📊</span>

                <span>ダッシュボード</span>

            </a>

            <a href="notice.html" class="active">

                <span class="menu-icon">📢</span>

                <span>お知らせ管理</span>

            </a>

            <a href="events.html">

                <span class="menu-icon">📅</span>

                <span>学校行事管理</span>

            </a>

            <a href="home.html">

                <span class="menu-icon">🏠</span>

                <span>ホーム管理</span>

            </a>

            <a href="users.html">

                <span class="menu-icon">👤</span>

                <span>管理者管理</span>

            </a>

            <a href="settings.html">

                <span class="menu-icon">⚙️</span>

                <span>サイト設定</span>

            </a>

        </nav>

        <div class="sidebar-bottom">

            <a href="login.html">

                <span class="menu-icon">🚪</span>

                <span>ログアウト</span>

            </a>

        </div>

    </aside>

    <!-- ===== メイン ===== -->

    <main class="dashboard-main">

        <header class="top-header">

            <div>

                <h1 class="page-title">

                    📢 お知らせ管理

                </h1>

                <p class="page-subtitle">

                    学校のお知らせを追加・編集・削除できます。

                </p>

            </div>

            <div class="header-right">

                <button class="primary-button" id="addNoticeButton">

                    ＋ 新しいお知らせ

                </button>

            </div>

        </header>

        <!-- コンテンツ -->

        <section class="dashboard-content">

            <!-- 検索 -->

            <div class="content-card">

                <div class="table-toolbar">

                    <input
                        type="text"
                        class="search-input"
                        placeholder="お知らせを検索...">

                    <select class="filter-select">

                        <option>すべて</option>
                        <option>公開</option>

                    </select>

                </div>

            </div>

            <!-- お知らせ一覧 -->

            <div class="content-card">

                <h2>

                    📋 お知らせ一覧

                </h2>

                <table class="admin-table">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>タイトル</th>

                            <th>公開日</th>

                            <th>状態</th>

                            <th>操作</th>

                        </tr>

                    </thead>

                    <tbody id="notice-list">                    </tbody>

                </table>

            </div>

            <!-- ページ切り替え -->

            <div class="content-card">

                <div class="pagination">

                    <button class="page-button">

                        ◀ 前へ

                    </button>

                    <button class="page-number active">

                        1

                    </button>

                    <button class="page-button">

                        次へ ▶

                    </button>

                </div>

            </div>

            <!-- 最近追加されたお知らせ -->

            <div class="content-card">

                <h2>

                    🆕 最近追加されたお知らせ

                </h2>

                <div id="recent-notices" class="recent-list">

                </div>

            </div>

            <!-- フッター -->

            <footer class="dashboard-footer">

                <p>

                    © 2026 川中島中学校 CMS Version4

                </p>

            </footer>

        </section>

    </main>

</div><!-- JavaScript -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/guard.js"></script>

<script src="../js/logout.js"></script>

<script src="../js/dashboard.js"></script>

<script src="../js/notice.js"></script>

</body>

</html>
