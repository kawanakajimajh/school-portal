<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>管理者ログイン</title>

    <link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<main class="login-page">

    <section class="login-card">

        <div class="login-logo">
            🏫
        </div>

        <h1 class="login-title">
            川中島中学校 CMS
        </h1>

        <p class="login-subtitle">
            Version4 管理システム<br>
            管理者専用ページ
        </p>

        <form class="login-form">

            <div class="form-group">

                <label class="form-label">
                    メールアドレス
                </label>

                <input
                    class="form-input"
                    type="email"
                    placeholder="teacher@example.com">

            </div>

            <div class="form-group">

                <label class="form-label">
                    パスワード
                </label>

                <input
                    class="form-input"
                    type="password"
                    placeholder="パスワード">

            </div>

            <label class="remember">

                <input type="checkbox">

                ログイン状態を保持する

            </label>

            <button
                class="login-button"
                type="submit">

                ログイン

            </button>

        </form>

        <div class="login-divider"></div>

        <div class="login-footer">

            <strong>

                川中島中学校 CMS Version4

            </strong>

            <br>

            ©2026 Kawanakajima Junior High School

        </div>

    </section>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
