<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定 | 川中島中学校ポータルサイト</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Yu Gothic UI","Meiryo",sans-serif;
}

body{
    background:#eef3f8;
}

.app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
}

.sidebar{
    background:linear-gradient(180deg,#2563eb,#1d4ed8);
    color:white;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:35px;
}

.menu{
    list-style:none;
}

.menu li{
    margin-bottom:10px;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px 16px;
    border-radius:12px;
    transition:.2s;
}

.menu a:hover,
.menu a.active{
    background:rgba(255,255,255,.18);
}

.main{
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.page-title{
    font-size:32px;
    color:#2563eb;
}

.user{
    background:white;
    padding:12px 18px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card{
    background:white;
    border-radius:18px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card h2{
    color:#2563eb;
    margin-bottom:15px;
}

.card p{
    line-height:1.8;
}

.setting-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #e5e7eb;
}

.setting-item:last-child{
    border-bottom:none;
}

.version{
    color:#666;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

@media(max-width:700px){

.app{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

}

</style>

</head>

<body>

</div>

</div>

</div>
