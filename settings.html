<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>設定 | 川中島中学校ポータル</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="theme-blue">

<div class="container">

    <!-- サイドバー -->

    <aside class="sidebar">

        <div class="logo">

            🏫<br>

            川中島中学校

        </div>

        <ul class="menu">

            <li>
                <a href="index.html">
                    🏠 ホーム
                </a>
            </li>

            <li>
                <a href="notice.html">
                    📢 お知らせ
                </a>
            </li>

            <li>
                <a href="events.html">
                    📅 学校行事
                </a>
            </li>

            <li>
                <a class="active" href="settings.html">
                    ⚙️ 設定
                </a>
            </li>

        </ul>

    </aside>

    <!-- メイン -->

    <main class="main">

        <div class="header">

            <div>

                <h1>
                    ⚙️ 設定
                </h1>

                <p>
                    ポータルサイトの表示設定を変更できます。
                </p>

            </div>

            <div class="user">

                <div id="clock" class="clock">
                    00:00:00
                </div>

                <div id="date" class="date">
                    2026年7月22日（水）
                </div>

            </div>

        </div>

        <!-- テーマカラー -->

        <div class="card">

            <h2>
                🎨 テーマカラー
            </h2>

            <p>

                お好きなテーマカラーを選択してください。

            </p>

            <br>

            <div class="theme-buttons">                <button
                    id="blueTheme"
                    class="theme-btn">

                    🔵 ブルー

                </button>

                <button
                    id="greenTheme"
                    class="theme-btn">

                    🟢 グリーン

                </button>

                <button
                    id="purpleTheme"
                    class="theme-btn">

                    🟣 パープル

                </button>

                <button
                    id="orangeTheme"
                    class="theme-btn">

                    🟠 オレンジ

                </button>

            </div>

        </div>

        <!-- 設定について -->

        <div class="card section-space">

            <h2>
                ℹ️ 設定について
            </h2>

            <p>

                テーマカラーを変更すると、
                ポータルサイト全体のデザインカラーが変更されます。

            </p>

            <br>

            <p>

                選択したテーマカラーは自動的に保存され、
                次回アクセス時にも同じ色で表示されます。

            </p>

        </div>        <!-- フッター -->

        <footer class="footer">

            <p>
                © 2026 川中島中学校ポータルサイト
            </p>

        </footer>

    </main>

</div>

<!-- JavaScript -->

<script src="js/app.js"></script>

</body>

</html>
