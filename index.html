<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>川中島中学校ポータルサイト</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Yu Gothic UI","Segoe UI",sans-serif;
}

body{
    background:#eef3f8;
}

.container{
    display:grid;
    grid-template-columns:240px 1fr 300px;
    min-height:100vh;
}

/* サイドバー */

.sidebar{

    background:linear-gradient(180deg,#2563eb,#1d4ed8);
    color:white;
    padding:25px;

}

.logo{

    font-size:24px;
    font-weight:bold;
    margin-bottom:40px;
    line-height:1.5;

}

.menu{

    list-style:none;

}

.menu li{

    margin-bottom:10px;

}

.menu a{

    display:block;
    color:white;
    text-decoration:none;
    padding:14px 18px;
    border-radius:12px;
    transition:.2s;

}

.menu a:hover{

    background:rgba(255,255,255,.15);

}

.menu a.active{

    background:rgba(255,255,255,.22);

}

/* メイン */

.main{

    padding:30px;

}

.header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;

}

.clock{

    font-size:34px;
    font-weight:bold;
    color:#2563eb;

}

.date{

    color:#666;
    margin-top:5px;

}

.user{

    background:white;
    padding:12px 18px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.banner{

    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    border-radius:18px;
    padding:30px;
    margin-bottom:25px;

}

.banner h2{

    margin-bottom:10px;

}

.card{

    background:white;
    border-radius:18px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.card h3{

    color:#2563eb;
    margin-bottom:15px;

}

.notice-item{

    padding:12px 0;
    border-bottom:1px solid #eee;

}

.notice-item:last-child{

    border-bottom:none;

}

/* 右側 */

.right{

    padding:25px;

}

.weather{

    text-align:center;

}

.weather .icon{

    font-size:60px;

}

@media(max-width:1000px){

.container{

grid-template-columns:220px 1fr;

}

.right{

display:none;

}

}

@media(max-width:700px){

.container{

grid-template-columns:1fr;

}

.sidebar{

display:none;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

🏫<br>
川中島中学校

</div>

<ul class="menu">

<li><a class="active" href="index.html">🏠 ホーム</a></li>

<li><a href="notice.html">📢 お知らせ</a></li>

<li><a href="events.html">📅 学校行事</a></li>

<li><a href="settings.html">⚙️ 設定</a></li>

</ul>

</div>

<div class="header">

<div>

<div id="clock" class="clock"></div>

<div id="date" class="date"></div>

</div>

<div class="user">

🔔 通知

</div>

</div>

<div class="banner">

<h2>川中島中学校ポータルへようこそ！</h2>

<p>

学校からのお知らせや学校行事を確認できます。

</p>

</div>

<div class="card">

<h3>📢 最新のお知らせ</h3>

<div class="notice-item">

</div>

<div class="notice-item">

</div>

<div class="notice-item">

</div>

</div>

<h3>📅 近日中の学校行事</h3>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

const week=["日","月","火","水","木","金","土"];

document.getElementById("clock").textContent=
now.toLocaleTimeString("ja-JP");

document.getElementById("date").textContent=
`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${week[now.getDay()]})`;

}

updateClock();

setInterval(updateClock,1000);

</script>
<script src="js/app.js"></script>
</body>
</html>
